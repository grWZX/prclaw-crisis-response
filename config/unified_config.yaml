# 统一公关传播智能体系统配置文件

llm:
  provider: "openai_compatible"        # openai / openai_compatible / kimi / google / qwen / deepseek
  flash_model: "qwen3.5-plus"        # 简单任务/查询
  thinking_model: "qwen3.5-plus"      # 报告/长文本/推理
  max_tokens: 2048
  temperature: 0.6
  api_keys:
    openai_compatible: "${APIKEY}"
    openai: "${OPENAI_API_KEY}"
    kimi: "${KIMI_API_KEY}"
    google: "${GOOGLE_API_KEY}"
    qwen: "${QWEN_API_KEY}"
    deepseek: "${DEEPSEEK_API_KEY}"
  base_urls:
    openai_compatible: "https://coding.dashscope.aliyuncs.com/v1"
    openai: "https://api.openai.com/v1"
    kimi: "https://api.moonshot.cn/v1"
    google: "https://generativelanguage.googleapis.com/v1beta/openai"
    qwen: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    deepseek: "https://api.deepseek.com"

neo4j:
  uri: "neo4j://127.0.0.1:7687"
  user: "neo4j"
  # 请使用环境变量 NEO4J_PASSWORD（见 .env.example），勿在仓库中提交真实密码
  password: ""
  database: "neo4j"

vector_store:
  persist_dir: "./vector_store/chroma_db"
  collection_name: "pr_unified"

retrieval:
  top_k: 10
  max_context_chars: 16000

paths:
  output_dir: "./outputs"
  data_dir: "./data"

# 系统功能配置
features:
  knowledge_query: true
  plan_generation: true
  entity_analysis: true
  document_export: true

# 方案生成配置
plan_generation:
  default_outputs: ["A", "B", "C", "D", "E", "F"]
  auto_save: true
  export_formats: ["markdown", "word", "ppt"]

# RLHF配置
rlhf:
  enabled: true
  use_for_generation: false
  feedback_db_path: "./data/feedback.db"
  min_feedback_for_training: 10
  training_interval: 100
  reward_model_path: "./models/reward_model.json"
  brand_knowledge_path: "./data/brands"
  methodology_rules_path: "./data/rules"

# Vault 笔记库配置（默认关闭；开启后 path 留空则使用项目下 data/vault，或设 VAULT_PATH）
vault:
  enabled: false
  path: ""
  watch_enabled: true
  sync_interval: 60  # 秒
  index_on_startup: true

# TrendRadar 议题追踪配置
trendradar:
  enabled: true
  bilibili:
    crawl_interval: 3600  # 秒
    max_videos_per_up: 50
  ai_topics:
    keywords:
      - "AI"
      - "大模型"
      - "LLM"
      - "GPT"
      - "Claude"
      - "Gemini"
      - "AGI"
      - "机器学习"
      - "深度学习"
    min_relevance_score: 0.7
  report:
    auto_generate: true
    schedule: "daily"  # daily/weekly/monthly
